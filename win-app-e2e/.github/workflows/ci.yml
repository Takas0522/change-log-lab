name: ci

on:
  pull_request:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run optional WPF native UI E2E job"
        required: false
        default: false
        type: boolean
      e2e_suite:
        description: "E2E suite"
        required: false
        default: smoke
        type: choice
        options:
          - smoke
          - regression

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\OrderClientApp.slnx

      - name: Build
        run: dotnet build .\OrderClientApp.slnx -c Release --no-restore

      - name: Unit/Integration tests
        run: dotnet test .\tests\OrderClientApp.Domain.Tests\OrderClientApp.Domain.Tests.csproj -c Release --no-build --logger "trx;LogFileName=domain-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            tests\OrderClientApp.Domain.Tests\TestResults\

  wpf-native-e2e:
    runs-on: windows-latest
    needs: build-test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\OrderClientApp.slnx

      - name: Build WPF app (Release)
        run: dotnet build .\src\OrderClientApp.Wpf\OrderClientApp.Wpf.csproj -c Release --no-restore

      - name: Run WinAppCli suite (contract-first)
        shell: pwsh
        run: |
          ./tests/wpf-native-e2e/scripts/run-winappcli-suite.ps1 `
            -Suite "${{ inputs.e2e_suite }}" `
            -AppPath ".\src\OrderClientApp.Wpf\bin\Release\net10.0-windows\OrderClientApp.Wpf.exe"

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpf-native-e2e-artifacts
          path: artifacts\e2e\
